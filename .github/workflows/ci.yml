name: MCP CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RADIOCHRON_GIT_SHA: ${{ github.sha }}

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: radiochron-mcp-linux-x64
          - os: macos-15
            artifact: radiochron-mcp-macos-arm64
          - os: macos-15-intel
            artifact: radiochron-mcp-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - name: Verify binary provenance
        shell: bash
        run: |
          test "$(target/release/radiochron --build-info | sed -n 's/.*"git_sha":"\([^"]*\)".*/\1/p')" = "${GITHUB_SHA}"
          shasum -a 256 target/release/radiochron > target/release/radiochron.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/radiochron
            target/release/radiochron.sha256

  windows-gnu:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
      - name: Use the self-contained GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --component clippy,rustfmt
          rustup default stable-x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - name: Verify binary provenance
        shell: pwsh
        run: |
          $info = target/release/radiochron.exe --build-info | ConvertFrom-Json
          if ($info.git_sha -ne '${{ github.sha }}') { throw 'binary commit does not match workflow commit' }
          (Get-FileHash target/release/radiochron.exe -Algorithm SHA256).Hash.ToLower() + '  radiochron.exe' | Set-Content target/release/radiochron.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: radiochron-mcp-windows
          path: |
            target/release/radiochron.exe
            target/release/radiochron.exe.sha256
      - name: Attest tagged binary provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/radiochron.exe

  msrv:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use declared MSRV
        run: |
          rustup toolchain install 1.78.0-x86_64-pc-windows-gnu
          rustup default 1.78.0-x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  coverage:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: radiochron-mcp-coverage
          path: lcov.info
